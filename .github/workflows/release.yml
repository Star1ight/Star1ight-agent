name: Release binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, e.g. v0.1.0. If empty, uses current ref name.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            goamd64: v1
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            goamd64: ''
            suffix: linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          export CGO_ENABLED=0
          export GOOS='${{ matrix.goos }}'
          export GOARCH='${{ matrix.goarch }}'
          if [ -n '${{ matrix.goamd64 }}' ]; then
            export GOAMD64='${{ matrix.goamd64 }}'
          fi
          go build -trimpath \
            -buildvcs=false \
            -tags 'with_quic with_utls' \
            -ldflags "-s -w -buildid= -X main.agentVersion=${GITHUB_REF_NAME}" \
            -o 'dist/star1ight-agent-${{ matrix.suffix }}' \
            ./cmd/star1ight-agent

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum 'star1ight-agent-${{ matrix.suffix }}' > 'star1ight-agent-${{ matrix.suffix }}.sha256'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: star1ight-agent-${{ matrix.suffix }}
          path: |
            dist/star1ight-agent-${{ matrix.suffix }}
            dist/star1ight-agent-${{ matrix.suffix }}.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [ -n '${{ inputs.tag }}' ]; then
            tag='${{ inputs.tag }}'
          elif [ "${GITHUB_REF_TYPE}" = 'tag' ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="manual-${GITHUB_RUN_NUMBER}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
